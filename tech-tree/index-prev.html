<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Private search · tech tree</title>
<script src="vendor/cytoscape.min.js"></script>
<script src="vendor/dagre.min.js"></script>
<script src="vendor/cytoscape-dagre.js"></script>
<script src="graph.js"></script>
<style>
:root{--bg:#0a0e13;--ink:#e8edf2;--dim:#9fb0bd;--faint:#647683;--teal:#5bc8d6;--ember:#e3a56b;--green:#7bd6a0;--red:#e2725b;
--mono:ui-monospace,Menlo,monospace;--serif:"Iowan Old Style",Palatino,Georgia,serif;--sans:ui-sans-serif,system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:radial-gradient(1100px 700px at 80% -10%,#11202b 0,transparent 60%),var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
header{position:fixed;top:0;left:0;right:0;z-index:10;padding:18px 24px 14px;pointer-events:none}
h1{font-family:var(--serif);font-weight:500;font-size:1.5rem;letter-spacing:-.01em}
.sub{font-family:var(--mono);font-size:.72rem;color:var(--faint);letter-spacing:.04em;margin-top:.25rem}
#cy{position:absolute;inset:0;z-index:1}
.legend{position:fixed;left:24px;bottom:18px;z-index:10;display:flex;flex-wrap:wrap;gap:.45rem .9rem;font-family:var(--mono);font-size:.68rem;color:var(--dim);max-width:66vw}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:.4rem;vertical-align:middle;border:1.5px solid}
.lg-goal i{border-color:var(--teal);background:rgba(91,200,214,.18)}
.lg-cap i{border-color:var(--teal);background:rgba(91,200,214,.30)}
.lg-built i{border-color:var(--green);background:rgba(123,214,160,.18)}
.lg-des i{border-color:var(--ember);background:rgba(227,165,107,.16)}
.lg-frontier i{border-color:var(--ember);background:rgba(227,165,107,.12);border-style:dashed}
.lg-problem i{border-color:var(--red);background:rgba(226,114,91,.2)}
.lg-opt i{border-color:#5b8d97;background:rgba(91,200,214,.07)}
.lg-fam i{border-color:#8090a0;background:rgba(255,255,255,.03)}
.lg-prim i{border-color:#4a8b96;background:rgba(91,200,214,.06)}
.lg-stub i{border-color:#46505a;background:#0d1117;border-style:dotted}
#panel{position:fixed;top:0;right:0;height:100%;width:368px;max-width:88vw;z-index:20;background:rgba(14,19,26,.86);backdrop-filter:blur(20px) saturate(120%);-webkit-backdrop-filter:blur(20px) saturate(120%);border-left:1px solid rgba(255,255,255,.10);padding:78px 26px 26px;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);overflow-y:auto}
#panel.open{transform:none}
#panel .badge{display:inline-block;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border-radius:5px;border:1px solid;margin-bottom:.9rem}
#panel h2{font-family:var(--serif);font-weight:500;font-size:1.5rem;line-height:1.12;margin-bottom:.7rem}
#panel .desc{color:var(--dim);line-height:1.55;font-size:.96rem;margin-bottom:1.2rem}
#panel .row{margin-bottom:1rem}
#panel .k{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:.3rem}
#panel .v{color:var(--ink);font-size:.92rem;line-height:1.5}
#panel .open{border-left:2px solid var(--ember);padding-left:.8rem;color:var(--dim);font-size:.92rem;line-height:1.55}
#panel .lk a{display:block;color:var(--teal);text-decoration:none;font-size:.88rem;padding:.22rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
#panel .lk a:hover{text-decoration:underline}
#panel .close{position:absolute;top:74px;right:22px;font-family:var(--mono);font-size:1.1rem;color:var(--faint);cursor:pointer;border:0;background:none}
.hint{position:fixed;right:24px;top:20px;z-index:10;font-family:var(--mono);font-size:.7rem;color:var(--faint)}
</style></head><body>
<header><h1>Private search &#183; tech tree</h1><div class="sub">goal &#8594; capability &#8594; {protocol family | problem &#8594; solution} &#183; shared deps fan out &#183; hover to trace, click to pin</div></header>
<div class="hint" id="hint">hover to trace &#183; click to pin</div>
<div id="cy"></div>
<div class="legend">
<span class="lg-goal"><i></i>goal</span><span class="lg-cap"><i></i>capability</span><span class="lg-built"><i></i>built + live</span><span class="lg-des"><i></i>designed</span><span class="lg-frontier"><i></i>open frontier</span><span class="lg-problem"><i></i>problem</span><span class="lg-opt"><i></i>transport (by workload)</span><span class="lg-fam"><i></i>family</span><span class="lg-prim"><i></i>primitive</span><span class="lg-stub"><i></i>out of scope</span>
</div>
<aside id="panel"><button class="close" id="close">&#10005;</button><div id="panel-body"></div></aside>
<script>
cytoscape.use(cytoscapeDagre);

const NODES = window.TREE.nodes.map(n=>({data:n}));
const EDGES = window.TREE.edges.map(e=>({data:e}));

const cy = cytoscape({
 container: document.getElementById('cy'),
 elements: { nodes: NODES, edges: EDGES },
 wheelSensitivity: 0.2,
 style: [
  {selector:'node',style:{
   'shape':'round-rectangle','background-color':'#11161d','background-opacity':0.92,
   'border-width':1.5,'border-color':'#3a4550','label':'data(label)','color':'#cdd6df',
   'font-family':'ui-monospace,Menlo,monospace','font-size':'10.5px','text-wrap':'wrap','text-max-width':'120px',
   'text-valign':'center','text-halign':'center','width':'label','height':'label','padding':'11px','text-line-height':1.3
  }},
  {selector:'node.goal',style:{'border-color':'#5bc8d6','border-width':2,'background-color':'#0f2730','color':'#d6f3f8','font-size':'13px','font-weight':'bold'}},
  {selector:'node.capability',style:{'border-color':'#5bc8d6','border-width':2,'background-color':'#13313b','color':'#d6f3f8','font-weight':'bold'}},
  {selector:'node.option',style:{'border-color':'#5b8d97','background-color':'#102229','color':'#bcdde3'}},
  {selector:'node.family',style:{'border-color':'#8090a0','background-color':'#161b22','color':'#aeb8c2','font-size':'10px'}},
  {selector:'node.frontier',style:{'border-color':'#e3a56b','border-style':'dashed','background-color':'#241c12','color':'#f0cda0'}},
  {selector:'node.flagship',style:{'border-color':'#e3a56b','border-style':'dashed','border-width':2.5,'background-color':'#2e2113','color':'#f4d3a3','font-weight':'bold'}},
  {selector:'node.designed',style:{'border-color':'#e3a56b','background-color':'#221a11','color':'#ecc89a'}},
  {selector:'node.built',style:{'border-color':'#7bd6a0','background-color':'#10241a','color':'#c4ecd3'}},
  {selector:'node.problem',style:{'border-color':'#e2725b','border-width':2,'background-color':'#2a1612','color':'#f0b3a6'}},
  {selector:'node.primitive',style:{'border-color':'#4a8b96','background-color':'#101820','color':'#9fb0bd'}},
  {selector:'node.alternative',style:{'border-color':'#46505a','border-style':'dashed','background-color':'#0f141a','color':'#7c8893','opacity':0.7,'font-size':'10px'}},
  {selector:'node.stub',style:{'border-color':'#46505a','border-style':'dotted','border-width':1.5,'background-color':'#0d1117','color':'#7c8893','opacity':0.72,'font-size':'10px'}},
  {selector:'node.lineage',style:{'border-color':'#3a4550','background-color':'#0f141a','color':'#8b96a0','font-size':'9.5px'}},

  {selector:'edge',style:{
   'width':1.4,'curve-style':'bezier','target-arrow-shape':'triangle','arrow-scale':0.85,
   'line-color':'#3a4550','target-arrow-color':'#3a4550','opacity':0.2,
   'label':'data(label)','font-family':'ui-monospace,Menlo,monospace','font-size':'8px','color':'#8b96a0','text-opacity':0,
   'text-background-color':'#0a0e13','text-background-opacity':0.85,'text-background-padding':'2px'
  }},
  {selector:'edge[type="requires"]',style:{'line-color':'#4a98a6','target-arrow-color':'#4a98a6'}},
  {selector:'edge[type="realizes"]',style:{'line-color':'#57b6c2','target-arrow-color':'#57b6c2'}},
  {selector:'edge[type="member"]',style:{'line-color':'#5a6670','target-arrow-color':'#5a6670'}},
  {selector:'edge[type="handles"]',style:{'line-color':'#5a9e76','target-arrow-color':'#5a9e76','color':'#7bd6a0'}},
  {selector:'edge[type="creates"]',style:{'line-color':'#9a5a4a','target-arrow-color':'#9a5a4a','line-style':'dashed','color':'#c08a6a'}},
  {selector:'edge[type="blocks"]',style:{'line-color':'#e2725b','target-arrow-color':'#e2725b','line-style':'dashed','width':1.7,'color':'#e2725b'}},
  {selector:'edge[type="alt"]',style:{'line-color':'#46505a','target-arrow-color':'#46505a','line-style':'dashed','opacity':0.4}},

  {selector:'.faded',style:{'opacity':0.06}},
  {selector:'node.hl',style:{'opacity':1}},
  {selector:'edge.hl',style:{'opacity':0.95,'text-opacity':1,'width':1.8}}
 ],
 layout:{ name:'dagre', rankDir:'BT', nodeSep:52, rankSep:100, edgeSep:16, ranker:'network-simplex', nodeDimensionsIncludeLabels:true }
});

NODES.forEach(n=>{ cy.getElementById(n.data.id).addClass(n.data.cls); });
cy.fit(undefined, 36);

const CLS_LABEL={goal:'Goal',capability:'Capability · our focus',option:'Transport · by workload',family:'Protocol family',frontier:'Open frontier',flagship:'Open frontier · flagship',designed:'Designed, not built',built:'Built + live',problem:'Problem',primitive:'Primitive',alternative:'Alternative',stub:'Out of scope (terminal)',lineage:'Lineage'};
const STATUS_COLOR={goal:'#5bc8d6',capability:'#5bc8d6',option:'#7ec3cd',family:'#9aa6b2',frontier:'#e3a56b',flagship:'#e3a56b',designed:'#e3a56b',built:'#7bd6a0',problem:'#e2725b',primitive:'#7aa7b0',alternative:'#7c8893',stub:'#7c8893',lineage:'#8b96a0'};
const panel=document.getElementById('panel'),body=document.getElementById('panel-body'),hint=document.getElementById('hint');
const clean=s=>(s||'').replace(/\n/g,' ');
const list=coll=>coll.length?coll.map(x=>clean(x.data('label'))).join(' · '):'—';

function showPanel(n){
 const d=n.data(),c=STATUS_COLOR[d.cls]||'#9fb0bd';
 let h='';
 h+='<span class="badge" style="color:'+c+';border-color:'+c+'66">'+(CLS_LABEL[d.cls]||d.cls)+'</span>';
 h+='<h2>'+clean(d.label)+'</h2>';
 h+='<div class="desc">'+d.desc+'</div>';
 if(d.open){h+='<div class="row"><div class="k">the open question</div><div class="open">'+d.open+'</div></div>';}
 h+='<div class="row"><div class="k">depends on</div><div class="v">'+list(n.incomers('node'))+'</div></div>';
 h+='<div class="row"><div class="k">unlocks</div><div class="v">'+list(n.outgoers('node'))+'</div></div>';
 h+='<div class="row"><div class="k">who</div><div class="v">'+(d.actors||'—')+'</div></div>';
 if(d.links&&d.links.length){ h+='<div class="row"><div class="k">links</div><div class="v lk">'+d.links.map(l=>'<a href="'+l.url+'" target="_blank" rel="noopener">'+l.label+' &#8599;</a>').join('')+'</div></div>'; }
 body.innerHTML=h; panel.classList.add('open');
}
function focus(n){ const keep=n.predecessors().union(n.successors()).add(n); cy.elements().addClass('faded'); keep.removeClass('faded').addClass('hl'); }
function reset(){ cy.elements().removeClass('faded hl'); panel.classList.remove('open'); }

let locked=false;
cy.on('tap','node',e=>{ hint.style.display='none'; locked=true; focus(e.target); showPanel(e.target); });
cy.on('mouseover','node',e=>{ if(!locked) focus(e.target); });
cy.on('mouseout','node',e=>{ if(!locked) cy.elements().removeClass('faded hl'); });
cy.on('tap',e=>{ if(e.target===cy){ locked=false; reset(); } });
document.getElementById('close').onclick=()=>{ locked=false; reset(); };
addEventListener('keydown',e=>{ if(e.key==='Escape'){ locked=false; reset(); } });
</script></body></html>
