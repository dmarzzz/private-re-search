<style>
:root{
  --bg:#0e0e10; --panel:#15151a; --fg:#e8e6e1; --dim:#8a877f; --line:#26262a;
  --accent:#c89b3c; --accent-soft:rgba(200,155,60,.13); --accent-line:rgba(200,155,60,.4);
  --serif:"Instrument Serif",Georgia,serif;
  --sans:"Hanken Grotesk",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  color-scheme:dark;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden;
  -webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:6vh 7vw}
.slide{display:none;width:100%;max-width:1000px;animation:fade .35s ease}
.slide.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--accent);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.kicker::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--accent-line),transparent)}
h1{font-family:var(--serif);font-weight:400;line-height:1.04;margin:0 0 18px;letter-spacing:.2px}
.slide[data-kind=title] h1{font-size:64px}
h1{font-size:46px}
.body{font-family:var(--sans);font-size:18px;color:var(--dim);line-height:1.5;max-width:760px;margin:0 0 26px}
ul{list-style:none;padding:0;margin:0;max-width:840px}
li{font-size:16.5px;line-height:1.45;color:var(--fg);padding:9px 0 9px 22px;position:relative;
  border-top:1px solid var(--line)}
li:first-child{border-top:none}
li::before{content:"";position:absolute;left:0;top:18px;width:7px;height:7px;background:var(--accent);
  border-radius:1px;opacity:.8}
.cites{margin-top:26px;display:flex;flex-wrap:wrap;gap:7px}
.cite{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--accent-line);
  border-radius:5px;padding:3px 8px;cursor:pointer;background:var(--accent-soft);transition:.15s}
.cite:hover{background:var(--accent);color:var(--bg)}
/* idea slides */
.slide[data-kind=idea]{border-left:2px solid var(--accent);padding-left:34px;margin-left:-36px}
.ourtake{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--bg);background:var(--accent);padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:16px}
.note{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--accent);
  line-height:1.4;margin:0 0 22px;max-width:780px;opacity:.95}
/* references */
.refs{max-width:980px;max-height:74vh;overflow:auto;padding-right:12px}
.refs ol{margin:0;padding:0;counter-reset:r;list-style:none}
.refs li{border-top:1px solid var(--line);padding:11px 0 11px 46px;font-size:13.5px;color:var(--dim);line-height:1.45}
.refs li::before{content:none}
.refs li{counter-increment:r}
.refs li .rk{position:absolute;left:0;font-family:var(--mono);font-size:11px;color:var(--accent);
  width:40px;text-align:left}
.refs li.hit{background:var(--accent-soft);border-radius:6px}
.refs a{color:var(--fg);text-decoration:none;border-bottom:1px solid var(--line)}
.refs a:hover{color:var(--accent)}
.subtitle{font-family:var(--sans);font-size:18px;color:var(--dim);margin-top:4px;max-width:720px;line-height:1.5}
/* chrome */
#bar{position:fixed;top:0;left:0;height:2px;background:var(--accent);transition:width .3s;z-index:10}
#counter{position:fixed;bottom:20px;right:26px;font-family:var(--mono);font-size:12px;color:var(--dim);z-index:10}
#counter b{color:var(--accent)}
#hint{position:fixed;bottom:20px;left:26px;font-family:var(--mono);font-size:11px;color:var(--line);z-index:10}
.foot{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-family:var(--mono);
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--line)}
</style></head>

<script>
const DECK = {"title": "Minimizing client download in private search", "subtitle": "A literature review framed around open problems, then our ideas for agent-facing fresh search", "slides": [{"kind": "title", "kicker": "PRIVATE SEARCH / PIR", "headline": "Minimizing client download in private search", "body": "Where the download lives, why it is backwards for agents, and how to make it small.", "bullets": ["Literature review, open problems, then our ideas", "Audience: cryptography and systems researchers", "Grounding system: Periscope, a sharded private semantic search PoC"]}, {"kind": "problem", "kicker": "THE BARGAIN", "headline": "The SimplePIR/Tiptoe download bargain: pay once, query cheap", "body": "Hint-based PIR front-loads a large database-dependent download to make every later query tiny.", "bullets": ["SimplePIR: 121 MB hint for a 1 GB DB, then 242 KB/query at 10 GB/s/core", "DoublePIR shrinks the hint to 16 MB at 345 KB/query, 7.4 GB/s/core", "Tiptoe: 360M pages in 56.9 MiB total comm, 74% of it shipped before the query", "The deal is good when one client persists state and reuses it across many queries"], "citations": ["simplepir23", "tiptoe23"]}, {"kind": "problem", "kicker": "WHY IT IS BACKWARDS", "headline": "Agent-facing fresh search breaks the amortization assumption", "body": "The hint amortizes only over a long-lived client and a static index. Agents and freshness violate both.", "bullets": ["Agents are fleets of short-lived processes, not one laptop persisting a hint", "A fresh index means H = M·A changes; the hint is exactly the thing that goes stale", "Periscope measures the cost concretely: 104 MiB rank hint per shard, the entire client download", "YPIR shows hint-based CT auditing costs 48x more than hintless under daily updates"], "citations": ["tiptoe23", "ypir24", "simplepir23"]}, {"kind": "landscape", "kicker": "THE MAP", "headline": "Three PIR families, three download profiles", "body": "Where the download goes is the defining axis: a client hint, a per-query ciphertext, or nothing offline.", "bullets": ["Hint-based (LWE): SimplePIR/DoublePIR/FrodoPIR ship a large reusable client hint", "FHE/RLWE response-efficient: SealPIR, OnionPIR (128 KB to fetch 30 KB, 4.2x), Spiral (rate 0.81), Respire (6.1 KB online)", "Hintless: HintlessPIR evaluates the hint server-side (<=62% throughput, 4x comm); YPIR hits 12.1 GB/s with 2.5 MB total, zero offline", "Orthogonal axis: client-preprocessing PIR (Piano, Plinko, Single-Pass) makes the hint sublinear and updatable"], "citations": ["simplepir23", "frodopir23", "onionpir21", "spiral22", "respire24", "hintlesspir24", "ypir24", "piano24", "plinko25", "singlepass24"]}, {"kind": "open-problem", "kicker": "OPEN PROBLEM 1", "headline": "Hintless ranking without killing online throughput", "body": "Removing the hint should not cost an order of magnitude in server throughput or comm.", "bullets": ["HintlessPIR removes the hint via RLWE LinPIR but runs at <=62% of SimplePIR and 4x online comm", "YPIR recovers throughput (97% of SimplePIR, 2.5 MB total) via Chen-Dai-Kim-Song LWE-to-RLWE packing", "Tiptoe's own hintless variant is 7x slower, 35x comm for 1-bit records", "InsPIRe, PIRCOR, ZipPIR attack the comm/throughput gap; RECPIR was withdrawn 2025-12-06"], "citations": ["hintlesspir24", "ypir24", "tiptoe23", "chendaikimsong20", "inspire25", "pircor25", "zippir24"]}, {"kind": "open-problem", "kicker": "OPEN PROBLEM 2", "headline": "The routing table and the embedder are the second download", "body": "Even hintless ranking leaves the client downloading what it needs to route a query.", "bullets": ["Tiptoe ships ~20 MiB of text centroids plus a ~290 MiB embedding model so the client can route locally", "Periscope routes against per-shard float32 centroids; route-to-one-cluster recall@10 is only 0.674", "Compressing the route (PQ/OPQ/RaBitQ) trades a provable error bound against route quality", "Making the route oblivious (LSH+DPF, applehe24 cover queries) removes the centroid download but adds assumptions"], "citations": ["tiptoe23", "pq11", "opq13", "rabitq24", "andoni08", "preco22", "applehe24"]}, {"kind": "open-problem", "kicker": "OPEN PROBLEM 3", "headline": "Server-side selection without paying full homomorphic top-k", "body": "Moving argmax/top-k to the server shrinks download but homomorphic comparison is brutally expensive.", "bullets": ["Mazzone et al. (CKKS): 128 elements rank in ~5.76 s, argmax in ~12.83 s, sort in ~78.64 s", "Oblivious top-k networks (Cong-Geelen-Kang-Park) and SANNS garbled-circuit top-k scale only to small k,n", "Tiptoe instead returns encrypted scores and lets the client argmax locally; cheap because k,n are small post-route", "Open: confine homomorphic selection to a shortlist so the client downloads indices, not full score vectors"], "citations": ["mazzone25", "obltopk23", "sanns20", "tiptoe23"]}, {"kind": "open-problem", "kicker": "OPEN PROBLEM 4", "headline": "Freshness: does the hint dissolve under updates, or amortize?", "body": "An index that changes invalidates the hint. Two camps disagree on whether to remove it or update it.", "bullets": ["YPIR: hintless schemes are 'unaffected by update frequency'; 48x cheaper than hint-based daily CT updates", "Incremental camp keeps the hint but updates it proportional to changes: IncPIR, Plinko (Otilde(1)/entry), iSimplePIR (224x prep, 4.2x comm)", "ZipPIR regenerates server-side hints during idle time with no client interaction on update", "Periscope measures both: a 1k-doc update is a 3.91 MiB byte-exact row-delta (27x smaller), full resync at R~26k"], "citations": ["ypir24", "incpir22", "plinko25", "isimplepir26", "zippir26", "simplepir23"]}, {"kind": "open-problem", "kicker": "OPEN PROBLEM 5", "headline": "Single-server private ANN at scale, without non-collusion", "body": "Private nearest-neighbor over a public DB still pays large client storage or two-server trust.", "bullets": ["Servan-Schreiber et al.: lightweight private ANN but two non-colluding servers (LSH + DPF)", "Pacmann: single-server, client walks the graph via preprocessing-PIR, 2.5x recall over Tiptoe, but ~0.6-2.9 GB client storage", "Panther: single-server, co-designs PIR + secret-sharing + GC + HE, 10M points in 18 s, no non-collusion", "Compass: oblivious HNSW over the client's own private data via Ring ORAM"], "citations": ["preco22", "pacmann25", "panther25", "compass25"]}, {"kind": "frontier", "kicker": "THE FRONTIER", "headline": "Download, server-compute, and latency trade against each other", "body": "You cannot minimize all three; every scheme picks a corner.", "bullets": ["Big download, tiny online: SimplePIR (121 MB hint), but freshness re-pays it", "Zero download, more server compute: YPIR/HintlessPIR re-touch the matrix every query", "Tiny download via response-efficient FHE: Respire 6.1 KB online but 200-400 MB/s server throughput", "Periscope's own benches: hint MB is the cheap axis (63 MB at 1M docs); the record fetch is the latency cost center (1 rec 86ms -> 20 recs 907ms)"], "citations": ["simplepir23", "ypir24", "hintlesspir24", "respire24"]}, {"kind": "idea", "kicker": "OUR IDEA 1", "headline": "Hintless-rank Periscope: homomorphically evaluate H=M·A on the shard", "body": "The 104 MiB per-shard download is the rank hint. Remove it the way HintlessPIR/YPIR remove SimplePIR's hint.", "note": "Our take. 'Tiptoe without a client hint' was flagged as possibly-open in our brief; this pins it to a concrete construction.", "bullets": ["Keep M·A as the server matvec but evaluate the SimplePIR hint inner-product under RLWE (LinPIR + CDKS packing)", "Client uploads an encrypted query, gets back O(1) packed score ciphertexts, argmaxes top-k locally", "Per-shard client state drops ~2 orders of magnitude: from 104 MiB to centroid + KB codebook", "Risk: inherits the 0.674 route-to-one-cluster recall ceiling unless paired with multi-probe"], "citations": ["hintlesspir24", "ypir24", "tiptoe23", "simplepir23", "chendaikimsong20"]}, {"kind": "idea", "kicker": "OUR IDEA 2", "headline": "Freshness dissolves with the hint, not with a delta protocol", "body": "If ranking is hintless there is no client-side H to invalidate, so a document append costs the client zero per-epoch download.", "note": "Our take. The freshness problem and the download problem are the same problem viewed twice, as our brief hypothesized.", "bullets": ["FRESHNESS.md's whole delta protocol exists only to avoid re-shipping the 104 MiB hint", "Hintless ranking turns its six engineering sections into a one-line consequence for the rank plane", "Maps YPIR's '48x cheaper under daily updates' onto winning the freshness race by construction", "Cost shifts: server re-touches the score matrix per query; recluster epochs still re-pull KB-scale centroids"], "citations": ["ypir24", "hintlesspir24", "tiptoe23", "zippir24"]}, {"kind": "idea", "kicker": "OUR IDEA 3", "headline": "RaBitQ centroid sketch: ship the routing table at 1 bit/dim with a provable bound", "body": "Replace float32 centroids with a seed-derived JL-rotation plus a D-bit code per centroid.", "note": "Our take. Applies a 2024 quantizer with theoretical error bounds to the routing table, not the database vectors.", "bullets": ["768-dim centroid: 96 bytes vs 3072, a 32x cut, with RaBitQ's unbiased estimator giving a sharp error bound", "Query stays uncompressed (asymmetric distance), so query-side precision is preserved", "Seed-derived rotation makes new centroids 96-byte appends, composing with the freshness row-delta protocol", "Risk: cosine-on-PCA Tiptoe embeddings may need OPQ-style learned rotation, eroding the closed-form bound"], "citations": ["rabitq24", "tiptoe23", "pq11", "opq13"]}, {"kind": "idea", "kicker": "OUR IDEA 4", "headline": "Batched top-k record fetch via Respire/SpiralStream, KB-scale in one round", "body": "After ranking yields encrypted indices, fetch all k winning records in a single high-rate batched query.", "note": "Our take. Treats record fetch as a batched-PIR problem distinct from ranking, so each plane uses the scheme that minimizes ITS download.", "bullets": ["Respire: 1M x 256-byte records at 6.1 KB online, batch codes give 3.4-7.1x comm reduction for k records", "Replaces k separate OnionPIR-style 128 KB fetches with one single-digit-KB packed response", "Composes with Periscope's already-trivial URL hint (2.0 MiB, rank-1 patchable, 512 B/doc)", "Risk: Respire reintroduces a 3.9 MB upload-side hint; batch codes need fixed-k padding to hide k"], "citations": ["respire24", "spiral22", "onionpir21", "sealpir18"]}, {"kind": "idea", "kicker": "OUR IDEA 5 (CONTRARIAN)", "headline": "Split-freshness: hintless for the hot tail, server-regenerated hint for the cold bulk", "body": "Frequent updates touch only a small recent tail. Assign different PIR families to different freshness regimes within one shard.", "note": "Our take. Generalizes the recluster epoch into a standing two-tier architecture; the incremental-PIR insight applied at the segment level.", "bullets": ["HOT (recent append tail): fully hintless YPIR-packed matvec, cheap because the tail is tiny, instant freshness", "COLD (stable bulk): server-side hint regenerated during idle time (ZipPIR), never shipped to the client", "Both segments answer the same encrypted query; client merges two small score vectors and takes top-k", "Bounds the hintless server-compute penalty to the hot tail; client download stays KB-scale always"], "citations": ["ypir24", "zippir26", "hintlesspir24", "incpir22"]}, {"kind": "references", "kicker": "REFERENCES", "headline": "Cited work (all verified against primary sources)", "body": "Author lists and figures corrected per the verified survey; withdrawn and preprint status flagged.", "bullets": []}, {"kind": "closing", "kicker": "CLOSING", "headline": "The download and the freshness problem are the same problem", "body": "For agent-facing fresh search, the hint is a liability twice over: it must be re-downloaded per fleet member and re-validated per epoch.", "bullets": ["Hintless ranking dissolves both at once; the cost moves to server compute we can bound with a hot/cold split", "Route on a tiny quantized codebook with a provable bound; fetch records in one batched round", "Pick the PIR family per shard by churn rate, published in the freshness manifest", "Next measurement: agent session-length distribution decides whether amortization or hintless wins"]}], "references": [{"key": "simplepir23", "citation": "Alexandra Henzinger, Matthew M. Hong, Henry Corrigan-Gibbs, Sarah Meiklejohn, Vinod Vaikuntanathan. One Server for the Price of Two: Simple and Fast Single-Server Private Information Retrieval. USENIX Security 2023. https://eprint.iacr.org/2022/949"}, {"key": "tiptoe23", "citation": "Alexandra Henzinger, Emma Dauterman, Henry Corrigan-Gibbs, Nickolai Zeldovich. Private Web Search with Tiptoe. SOSP 2023. https://eprint.iacr.org/2023/1438"}, {"key": "hintlesspir24", "citation": "Baiyu Li, Daniele Micciancio, Mariana Raykova, Mark Schultz-Wu. Hintless Single-Server Private Information Retrieval. CRYPTO 2024. https://eprint.iacr.org/2023/1733"}, {"key": "ypir24", "citation": "Samir Jordan Menon, David J. Wu. YPIR: High-Throughput Single-Server PIR with Silent Preprocessing. USENIX Security 2024. https://eprint.iacr.org/2024/270"}, {"key": "inspire25", "citation": "Rasoul Akhavan Mahdavi, Sarvar Patel, Joon Young Seo, Kevin Yeo. InsPIRe: Communication-Efficient PIR with Server-side Preprocessing. IACR ePrint 2025/1352. https://eprint.iacr.org/2025/1352"}, {"key": "pircor25", "citation": "Xue Yang, Ruida Wang, Depan Peng, Kun Liu, Xianhui Lu, Xiaohu Tang. PIRCOR: Communication-Optimal Hintless Single-Server PIR via Homomorphic Rotation. IACR ePrint 2025. https://dblp.org/rec/journals/iacr/YangWPLLT25.html"}, {"key": "zippir24", "citation": "Rasoul Akhavan Mahdavi, Abdulrahman Diaa, Florian Kerschbaum. HE is all you need: Compressing FHE Ciphertexts using Additive HE. arXiv 2303.09043 (rev. 2024). https://arxiv.org/abs/2303.09043"}, {"key": "zippir26", "citation": "Rasoul Akhavan Mahdavi, Abdulrahman Diaa, Florian Kerschbaum. ZipPIR: High-throughput Single-server PIR without Client-side Storage. USENIX Security 2026. https://arxiv.org/abs/2603.09190"}, {"key": "chendaikimsong20", "citation": "Hao Chen, Wei Dai, Miran Kim, Yongsoo Song. Efficient Homomorphic Conversion Between (Ring) LWE Ciphertexts. ACNS 2021 (IACR ePrint 2020/015). https://eprint.iacr.org/2020/015"}, {"key": "spiral22", "citation": "Samir Jordan Menon, David J. Wu. Spiral: Fast, High-Rate Single-Server PIR via FHE Composition. IEEE S&P 2022. https://eprint.iacr.org/2022/368"}, {"key": "onionpir21", "citation": "Muhammad Haris Mughees, Hao Chen, Ling Ren. OnionPIR: Response Efficient Single-Server PIR. ACM CCS 2021. https://eprint.iacr.org/2021/1081"}, {"key": "respire24", "citation": "Alexander Burton, Samir Jordan Menon, David J. Wu. Respire: High-Rate PIR for Databases with Small Records. ACM CCS 2024. https://eprint.iacr.org/2024/1165"}, {"key": "frodopir23", "citation": "Alex Davidson, Goncalo Pestana, Sofia Celi. FrodoPIR: Simple, Scalable, Single-Server Private Information Retrieval. PoPETs 2023(1) (IACR ePrint 2022/981). https://eprint.iacr.org/2022/981"}, {"key": "sealpir18", "citation": "Sebastian Angel, Hao Chen, Kim Laine, Srinath Setty. PIR with Compressed Queries and Amortized Query Processing. IEEE S&P 2018. https://eprint.iacr.org/2017/1142"}, {"key": "singlepass24", "citation": "Arthur Lazzaretti, Charalampos Papamanthou. Single Pass Client-Preprocessing Private Information Retrieval. USENIX Security 2024. https://www.usenix.org/conference/usenixsecurity24/presentation/lazzaretti"}, {"key": "piano24", "citation": "Mingxun Zhou, Andrew Park, Elaine Shi, Wenting Zheng. Piano: Extremely Simple, Single-Server PIR with Sublinear Server Computation. IEEE S&P 2024. https://eprint.iacr.org/2023/452"}, {"key": "plinko25", "citation": "Alexander Hoover, Sarvar Patel, Giuseppe Persiano, Kevin Yeo. Plinko: Single-Server PIR with Efficient Updates via Invertible PRFs. EUROCRYPT 2025. https://eprint.iacr.org/2024/318"}, {"key": "incpir22", "citation": "Yiping Ma, Ke Zhong, Tal Rabin, Sebastian Angel. Incremental Offline/Online PIR. USENIX Security 2022. https://eprint.iacr.org/2021/1438"}, {"key": "isimplepir26", "citation": "Incremental Single-Server Private Information Retrieval (iSimplePIR). IACR ePrint 2026/030. https://eprint.iacr.org/2026/030"}, {"key": "pq11", "citation": "Herve Jegou, Matthijs Douze, Cordelia Schmid. Product Quantization for Nearest Neighbor Search. IEEE TPAMI 33(1):117-128, 2011. https://inria.hal.science/inria-00514462"}, {"key": "opq13", "citation": "Tiezheng Ge, Kaiming He, Qifa Ke, Jian Sun. Optimized Product Quantization for Approximate Nearest Neighbor Search. IEEE CVPR 2013. https://openaccess.thecvf.com/content_cvpr_2013/html/Ge_Optimized_Product_Quantization_2013_CVPR_paper.html"}, {"key": "rabitq24", "citation": "Jianyang Gao, Cheng Long. RaBitQ: Quantizing High-Dimensional Vectors with a Theoretical Error Bound for Approximate Nearest Neighbor Search. SIGMOD 2024. https://arxiv.org/abs/2405.12497"}, {"key": "andoni08", "citation": "Alexandr Andoni, Piotr Indyk. Near-Optimal Hashing Algorithms for Approximate Nearest Neighbor in High Dimensions. Communications of the ACM 51(1):117-122, 2008. https://dl.acm.org/doi/10.1145/1327452.1327494"}, {"key": "applehe24", "citation": "Apple Machine Learning Research. Combining Machine Learning and Homomorphic Encryption in the Apple Ecosystem. Apple ML Research blog, Oct 2024. https://machinelearning.apple.com/research/homomorphic-encryption"}, {"key": "preco22", "citation": "Sacha Servan-Schreiber, Simon Langowski, Srinivas Devadas. Private Approximate Nearest Neighbor Search with Sublinear Communication. IEEE S&P 2022. https://eprint.iacr.org/2021/1157"}, {"key": "pacmann25", "citation": "Mingxun Zhou, Elaine Shi, Giulia Fanti. Pacmann: Efficient Private Approximate Nearest Neighbor Search. ICLR 2025. https://eprint.iacr.org/2024/1600"}, {"key": "panther25", "citation": "Jingyu Li, Zhicong Huang, Min Zhang, Cheng Hong, Jian Liu, Tao Wei, Wenguang Chen. Panther: Private Approximate Nearest Neighbor Search in the Single Server Setting. ACM CCS 2025. https://eprint.iacr.org/2024/1774"}, {"key": "compass25", "citation": "Jinhao Zhu, Liana Patel, Matei Zaharia, Raluca Ada Popa. Compass: Encrypted Semantic Search with High Accuracy. USENIX OSDI 2025. https://eprint.iacr.org/2024/1255"}, {"key": "mazzone25", "citation": "Federico Mazzone, Maarten Everts, Florian Hahn, Andreas Peter. Efficient Ranking, Order Statistics, and Sorting under CKKS. USENIX Security 2025. https://www.usenix.org/system/files/usenixsecurity25-mazzone.pdf"}, {"key": "obltopk23", "citation": "Kelong Cong, Robin Geelen, Jiayi Kang, Jeongeun Park. Revisiting Oblivious Top-k Selection with Applications to Secure k-NN Classification. SAC 2024 (IACR ePrint 2023/852). https://eprint.iacr.org/2023/852"}, {"key": "sanns20", "citation": "Hao Chen, Ilaria Chillotti, Yihe Dong, Oxana Poburinnaya, Ilya Razenshteyn, M. Sadegh Riazi. SANNS: Scaling Up Secure Approximate k-Nearest Neighbors Search. USENIX Security 2020. https://arxiv.org/abs/1904.02033"}]};
const refMap = Object.fromEntries(DECK.references.map(r=>[r.key, r.citation]));
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const stage = document.getElementById("stage");
let i = 0;

function citeChips(keys){
  if(!keys||!keys.length) return "";
  return '<div class="cites">'+keys.map(k=>`<span class="cite" data-k="${esc(k)}" title="${esc(refMap[k]||k)}">${esc(k)}</span>`).join("")+"</div>";
}
function bullets(b){ return (b&&b.length)?"<ul>"+b.map(x=>`<li>${esc(x)}</li>`).join("")+"</ul>":""; }

function render(s){
  if(s.kind==="references"){
    const items = DECK.references.map(r=>{
      const m = r.citation.match(/(https?:\/\/\S+)/);
      const cite = m ? r.citation.replace(m[1], `<a href="${m[1]}" target="_blank" rel="noopener">${m[1]}</a>`) : r.citation;
      return `<li id="ref-${esc(r.key)}"><span class="rk">${esc(r.key)}</span>${cite}</li>`;
    }).join("");
    return `<div class="kicker">${esc(s.kicker)}</div><h1>${esc(s.headline)}</h1>
      ${s.body?`<p class="body">${esc(s.body)}</p>`:""}<div class="refs"><ol>${items}</ol></div>`;
  }
  let h = `<div class="kicker">${esc(s.kicker)}</div>`;
  if(s.kind==="idea") h += `<span class="ourtake">our take</span>`;
  h += `<h1>${esc(s.headline)}</h1>`;
  if(s.kind==="title" && DECK.subtitle) h += `<p class="subtitle">${esc(DECK.subtitle)}</p>`;
  if(s.body) h += `<p class="body">${esc(s.body)}</p>`;
  if(s.note) h += `<p class="note">${esc(s.note)}</p>`;
  h += bullets(s.bullets);
  h += citeChips(s.citations);
  return h;
}

function show(n){
  i = Math.max(0, Math.min(DECK.slides.length-1, n));
  const s = DECK.slides[i];
  stage.innerHTML = `<div class="slide on" data-kind="${esc(s.kind)}">${render(s)}</div>`;
  document.getElementById("bar").style.width = ((i+1)/DECK.slides.length*100)+"%";
  document.getElementById("counter").innerHTML = `<b>${String(i+1).padStart(2,"0")}</b> / ${DECK.slides.length}`;
  stage.querySelectorAll(".cite").forEach(c=>c.onclick=()=>{
    const k=c.dataset.k, ri=DECK.slides.findIndex(x=>x.kind==="references");
    if(ri>=0){ show(ri); setTimeout(()=>{const el=document.getElementById("ref-"+k);
      if(el){el.classList.add("hit");el.scrollIntoView({block:"center"});}},60); }
  });
}
addEventListener("keydown",e=>{
  if(["ArrowRight"," ","PageDown","ArrowDown"].includes(e.key)){e.preventDefault();show(i+1);}
  else if(["ArrowLeft","PageUp","ArrowUp"].includes(e.key)){e.preventDefault();show(i-1);}
  else if(e.key==="Home")show(0); else if(e.key==="End")show(DECK.slides.length-1);
});
addEventListener("click",e=>{ if(e.target.closest(".cite")||e.target.closest("a"))return;
  if(e.target.closest(".refs"))return; show(i+(e.clientX>innerWidth*0.32?1:-1)); });
show(0);
</script></body></html>
