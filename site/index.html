<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Private search in the age of agents</title>
<meta name="description" content="A research agenda: private search when the searcher is an agent.">
<style>
  :root {
    --bg: #0e0e10;
    --fg: #e8e6e1;
    --dim: #8a877f;
    --faint: #56554f;
    --line: #26262a;
    --panel: #15151a;
    --accent: #c89b3c;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .deck { height: 100vh; width: 100vw; }
  .slide {
    position: absolute; inset: 0; display: none;
    flex-direction: column; justify-content: center;
    padding: clamp(2rem, 6.5vw, 7.5rem) clamp(2rem, 7vw, 9rem);
    opacity: 0; transition: opacity .4s ease;
  }
  .slide.active { display: flex; opacity: 1; }
  .slide.title { justify-content: center; }

  .kicker {
    font-family: var(--mono); font-size: .72rem; letter-spacing: .24em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2.4rem, 6.2vw, 5rem); font-weight: 600;
    line-height: 1.0; letter-spacing: -.025em; max-width: 17ch;
  }
  .sub { color: var(--dim); margin-top: 1.6rem; font-size: clamp(1.05rem, 1.8vw, 1.5rem); max-width: 46ch; line-height: 1.4; }
  h2 {
    font-size: clamp(1.55rem, 3.4vw, 2.9rem); font-weight: 600;
    line-height: 1.08; letter-spacing: -.02em; max-width: 010ch; max-width: 21ch;
    margin-bottom: 1.5rem;
  }
  p { font-size: clamp(1rem, 1.5vw, 1.3rem); line-height: 1.55; max-width: 58ch; }
  p + p { margin-top: .9rem; }
  .lead { color: var(--dim); max-width: 60ch; font-size: clamp(1.02rem, 1.6vw, 1.38rem); margin-top: .3rem; }
  .dim { color: var(--dim); }
  em.h { color: var(--accent); font-style: normal; }

  ul { list-style: none; max-width: 64ch; margin-top: .4rem; }
  li {
    font-size: clamp(.98rem, 1.45vw, 1.25rem); line-height: 1.5;
    padding: .6rem 0 .6rem 1.7rem; position: relative; border-bottom: 1px solid var(--line);
  }
  li:before { content: ""; position: absolute; left: 0; top: 1.2rem; width: .55rem; height: 1px; background: var(--accent); }
  li b { font-weight: 600; }
  li .t { color: var(--dim); }

  .stats { display: flex; flex-wrap: wrap; gap: clamp(1.4rem, 4.5vw, 4rem); margin-top: .6rem; }
  .stat .n { font-family: var(--mono); font-size: clamp(2.2rem, 6vw, 4.4rem); font-weight: 600; letter-spacing: -.03em; color: var(--accent); }
  .stat .l { font-family: var(--mono); font-size: .7rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-top: .35rem; }

  .formula {
    font-family: var(--mono); font-size: clamp(1.05rem, 2.2vw, 1.7rem); color: var(--fg);
    margin: 1.5rem 0; padding: 1.1rem 1.4rem; border-left: 2px solid var(--accent);
    background: var(--panel); max-width: max-content; line-height: 1.4;
  }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(1.4rem, 4vw, 3.5rem); margin-top: .5rem; max-width: 74ch; }
  .col h3 { font-family: var(--mono); font-size: .74rem; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: .7rem; }
  .col p { font-size: clamp(.94rem, 1.4vw, 1.14rem); color: var(--dim); }
  .col p b { color: var(--fg); font-weight: 500; }

  .cta { margin-top: 1.8rem; }
  .cta a {
    display: inline-flex; align-items: center; gap: .7rem; text-decoration: none;
    font-family: var(--mono); font-size: clamp(.95rem, 1.5vw, 1.15rem); letter-spacing: .02em;
    color: var(--bg); background: var(--accent); padding: .85rem 1.5rem; border-radius: 4px;
    transition: transform .15s ease, background .15s ease;
  }
  .cta a:hover { transform: translateY(-1px); background: #d8ab48; }
  .cta .arrow { font-size: 1.1em; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    justify-content: space-between; align-items: center;
    padding: .9rem clamp(2rem, 7vw, 9rem);
    font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; color: var(--faint);
    border-top: 1px solid var(--line); background: var(--bg);
  }
  footer .nav { display: flex; gap: 1.2rem; }
  footer button { background: none; border: none; color: var(--faint); cursor: pointer; font: inherit; padding: 0; }
  footer button:hover { color: var(--accent); }
  .count em { color: var(--fg); font-style: normal; }
  .prog { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); transition: width .4s ease; z-index: 10; }
</style>
</head>
<body>
<div class="prog" id="prog"></div>
<div class="deck" id="deck"></div>
<footer>
  <span class="count" id="label"></span>
  <span class="nav"><button id="prev">&larr; prev</button><button id="next">next &rarr;</button></span>
</footer>

<script id="data" type="application/json">
{"title": "Private Search for Your Agents", "subtitle": "Search is being re-platformed off humans and onto autonomous agents, and the privacy stack we built for the first regime is being silently inherited by the second.", "slides": [{"kicker": "The offer", "heading": "Private search for your agents, buildable now", "blocks": [{"type": "lead", "text": "Your research agents emit a dense, intent-revealing query stream. Three known crypto layers can hide it today. Nothing new needs to be invented."}, {"type": "bullets", "items": [{"lead": "Hide WHO", "text": "Route egress so the provider never sees your client IP. Shipped primitive: Oblivious HTTP."}, {"lead": "Hide WHAT", "text": "Retrieve without the server learning the query. Shipped primitive: PIR-based private search."}, {"lead": "Pay unlinkably", "text": "Prove entitlement without revealing which account. Shipped primitive: Privacy Pass."}]}]}, {"kicker": "The problem", "heading": "Two secrets leak on every query", "blocks": [{"type": "p", "text": "An agent decomposes a task into many sub-queries fired at search engines, the open web, and model APIs. That trace leaks two separate things."}, {"type": "cols", "items": [{"title": "WHO is asking", "text": "Your egress IP, linkable to billing. The provider correlates the whole stream to one account."}, {"title": "WHAT you want", "text": "Query content and decomposition. A bag of terms is a quasi-identifier (the AOL 4417749 lesson)."}]}]}, {"kicker": "The problem", "heading": "Intent inversion: the agent-specific attack", "blocks": [{"type": "p", "text": "Functional decomposition forces semantic transparency. A sub-query for blood-pressure norms plus one for low-sodium recipes triangulate a condition no single query stated."}, {"type": "stats", "items": [{"n": "~85%", "label": "intent reconstructed from tool-call logs without the prompt (IntentMiner). Single unrefereed preprint, arXiv 2512.14166; needs replication."}, {"n": ">90%", "label": "website-fingerprinting accuracy against defended Tor (Sirinam et al.). Scope-specific: does not transfer to OHTTP or a mixnet."}]}, {"type": "p", "text": "Agent traffic is concurrent, low-jitter, bursty. Stripping human hesitation makes the metadata classifier's job easier, not harder. The exact numbers are early; the mechanism is not in doubt."}]}, {"kicker": "The problem", "heading": "The residential-proxy trap", "blocks": [{"type": "lead", "text": "A residential proxy solves delivery, not privacy. It is a trust-shift, not unlinkability."}, {"type": "bullets", "items": [{"lead": "One observer sees all", "text": "The gateway is in-path: your identity, destinations, timing, volume, linked to billing."}, {"lead": "No crypto guarantee", "text": "CONNECT tunnels leak SNI; MITM CA leaks content. You add the worst possible observer."}, {"lead": "Coercive supply", "text": "911 S5 botnet, IPIDEA trojanized SDKs, FBI PSA260312: routes through non-consenting devices."}]}, {"type": "p", "text": "Use it to evade bot-blocking if you must. Never count it as privacy. The honest replacement is on the next slides."}]}, {"kicker": "The one insight", "heading": "Agents are patient. That changes everything.", "blocks": [{"type": "lead", "text": "A human abandons a search that takes seconds. A background agent does not."}, {"type": "p", "text": "The strong privacy tech always filed under 'too slow for interactive use' is exactly what an agent can afford. The agent pays in tokens and wall-clock it already spends, not in human attention."}, {"type": "p", "text": "Nothing got cheaper. The cost function stopped charging for the resource these mechanisms consume. One caveat: transport privacy (OHTTP) was already cheap and never needed the patience flip. The flip is what makes PIR and mixnet egress affordable."}]}, {"kicker": "The stack / Layer 1", "heading": "Transport: hide WHO", "blocks": [{"type": "p", "text": "Route egress so no single party sees both your identity and your content. Status: standardized and in production. No patience flip required; it was already cheap."}, {"type": "cols", "items": [{"title": "Oblivious HTTP (RFC 9458)", "text": "Relay sees IP not content; gateway sees content not IP. In production fronting Google Safe Browsing over a Fastly-operated relay. Near-zero added latency. Wire this up today."}, {"title": "Mixnet (Loopix / Nym)", "text": "Per-hop Poisson mixing beats a global passive adversary. The mean-delay knob buys anonymity; for a patient agent, turning it up costs nothing."}]}]}, {"kicker": "The stack / Layer 2", "heading": "Content: hide WHAT", "blocks": [{"type": "p", "text": "Private Information Retrieval returns a result without the server learning the query. Drives content exposure toward zero, not merely obscured. Status: shipped at single-agent scale; web-scale fleet economics still open."}, {"type": "bullets", "items": [{"lead": "Tiptoe (public web)", "text": "Cryptography-only private search over ~360M pages. 2.7s online, ~57 MiB/query, ~74% prefetchable offline. Refereed and measured."}, {"lead": "PIR-RAG (own corpus)", "text": "~16.8s end-to-end on MS MARCO. Unrefereed preprint; numbers need replication."}, {"lead": "PRAG (corpus private too)", "text": "MPC route hiding query and database, sublinear comms. Workshop-scale."}]}]}, {"kicker": "The stack / Layer 3", "heading": "Access: pay and rate-limit without linking", "blocks": [{"type": "p", "text": "Authenticating and metering naively re-introduces the identity Layers 1 and 2 removed. Anonymous credentials fix this. Status: shipped."}, {"type": "cols", "items": [{"title": "Privacy Pass (PoPETs 2018)", "text": "Client proves it holds a valid token; issuance is unlinkable from redemption. Kagi ships it for search auth: extension fetches tokens in batches, redeems one per query."}, {"title": "Why it matters", "text": "Clears bot-blocks and rate limits by proving authorization, without re-acquiring a stable identity. The honest, crypto-backed alternative to the residential proxy."}]}]}, {"kicker": "Inventory", "heading": "Deployable today vs missing", "blocks": [{"type": "bullets", "items": [{"lead": "Transport: shippable", "text": "OHTTP as default tool transport (in production at Google Safe Browsing); Nym for global-adversary metadata hiding. Missing: a turnkey proxy/SDK an agent points at."}, {"lead": "Content: single-agent only", "text": "Tiptoe web search, PIR-RAG own corpus, at single/double-digit-second latency. Missing: web-scale RAG that amortizes offline cost across a fleet without re-linkage."}, {"lead": "Access: shippable", "text": "Privacy Pass unlinkable auth (shipped at Kagi). Missing: rate-limited anonymous credentials at agentic cadence; issuance that is not itself the linkage point."}, {"lead": "Not privacy at all", "text": "Residential proxies (delivery only) and Tor for agents (fingerprinting plus exit-blocking make it a wash)."}]}]}, {"kicker": "What to build / THE CLIMAX", "heading": "1. A turnkey private-search proxy and SDK", "blocks": [{"type": "lead", "text": "The thing your team starts this quarter. One endpoint the agent's HTTP client routes through. Change a base URL, not your code."}, {"type": "bullets", "items": [{"lead": "What", "text": "Terminates OHTTP (RFC 9458), regularizes emission schedule against fingerprinting, exposes a redemption hook for metered endpoints."}, {"lead": "Why hard", "text": "Needs an independently-run relay and gateway that do not collude; must present a coherent non-bot TLS/HTTP2 stack; padding fights latency budgets."}, {"lead": "Why it is the climax", "text": "Cheapest, highest-leverage, shippable-now win. Closes the WHO leak with a base-URL change. It is the direct replacement for the residential proxy."}]}]}, {"kicker": "What to build / bolt-ons", "heading": "Two upgrades that bolt onto the proxy", "blocks": [{"type": "cols", "items": [{"title": "2. Unlinkable metered access", "text": "Build Privacy Pass issuance and redemption at agent cadence: buy a budget, redeem unlinkable tokens per query, meter on tokens not tied to the buyer. Hard part: issuance becomes a linkage point if timing or batching is careless, and rate-limiting pulls against anonymity. Bolts straight onto the proxy's redemption hook."}, {"title": "3. Mixnet egress with a delay knob", "text": "Route non-time-critical egress over Nym, turning up the mean-delay knob the agent can afford. Hard part: exit reputation and destination-side blocking of mixnet egress. The patience flip is exactly what makes this free for a background agent."}]}]}, {"kicker": "What to build / the honest coda", "heading": "4. Private RAG: still a real blocker", "blocks": [{"type": "lead", "text": "Retrieve the document or vector the agent needs without the index server learning which one. Not shippable at fleet scale yet. This is the honest blocker, not the headline."}, {"type": "bullets", "items": [{"lead": "What", "text": "Wrap Tiptoe / PIR-RAG / PRAG as a private vector store with a normal retrieve(query) interface. Validate it by running the adversary's intent-inversion inference as the defender's own metric: if the attacker model cannot reconstruct intent from what the server sees, the layer holds."}, {"lead": "Why hard, concretely", "text": "Single-agent numbers are fine. The fleet break is the shared offline phase: PIR's whole speedup comes from a preprocessed hint or index reused across queries. Share that hint across agents and their access patterns into the shared structure become correlatable, re-linking the fleet. Re-randomize per agent and you pay the offline cost per agent, erasing the amortization. Sharing offline work and unlinkability are in direct tension; closing that gap is the one genuinely open crypto problem here."}, {"lead": "Why it still matters", "text": "Closes the WHAT leak for the agent's private corpus, where the most sensitive retrievals live."}]}]}, {"kicker": "sources", "heading": "What this stands on", "blocks": [{"type": "lead", "text": "The load-bearing systems and find </script>
<script>
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const deck = document.getElementById('deck');

  const esc = (s) => (s == null ? '' : String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
  // light inline markdown: **bold**, *italic*, `code`
  const inl = (s) => esc(s)
    .replace(/\[(.+?)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);border-bottom:1px solid rgba(200,155,60,.4);text-decoration:none">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/`(.+?)`/g, '<span style="font-family:var(--mono);color:var(--fg)">$1</span>')
    .replace(/\*(.+?)\*/g, '<em style="font-style:normal;color:var(--accent)">$1</em>');

  function block(b) {
    switch (b.type) {
      case 'p': return `<p>${inl(b.text)}</p>`;
      case 'lead': return `<p class="lead">${inl(b.text)}</p>`;
      case 'formula': return `<div class="formula">${esc(b.text)}</div>`;
      case 'bullets':
        return `<ul>${(b.items || []).map(it =>
          `<li>${it.lead ? `<b>${inl(it.lead)}</b> ` : ''}${inl(it.text || '')}</li>`).join('')}</ul>`;
      case 'stats':
        return `<div class="stats">${(b.items || []).map(it =>
          `<div class="stat"><div class="n">${esc(it.n)}</div><div class="l">${esc(it.label)}</div></div>`).join('')}</div>`;
      case 'cols':
        return `<div class="cols">${(b.items || []).map(it =>
          `<div class="col"><h3>${inl(it.title || '')}</h3><p>${inl(it.text || '')}</p></div>`).join('')}</div>`;
      case 'cta':
        return `<div class="cta"><a href="/post">${inl(b.text || 'Read the full post')} <span class="arrow">&rarr;</span></a></div>`;
      default: return '';
    }
  }

  const slides = [];
  // title slide
  slides.push(`<section class="slide title">
    <div class="kicker">${esc(DATA.kicker || 'a research agenda')}</div>
    <h1>${inl(DATA.title)}</h1>
    ${DATA.subtitle ? `<p class="sub">${inl(DATA.subtitle)}</p>` : ''}
  </section>`);
  // content slides
  (DATA.slides || []).forEach(s => {
    slides.push(`<section class="slide">
      <div class="kicker">${esc(s.kicker)}</div>
      <h2>${inl(s.heading)}</h2>
      ${(s.blocks || []).map(block).join('\n')}
    </section>`);
  });
  deck.innerHTML = slides.join('\n');

  const els = [...document.querySelectorAll('.slide')];
  const prog = document.getElementById('prog');
  const label = document.getElementById('label');
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(els.length - 1, n));
    els.forEach((s, k) => s.classList.toggle('active', k === i));
    prog.style.width = ((i + 1) / els.length * 100) + '%';
    label.innerHTML = `private search · <em>${i + 1}</em>/${els.length}`;
    location.hash = i + 1;
  }
  const next = () => show(i + 1), prev = () => show(i - 1);
  document.getElementById('next').onclick = next;
  document.getElementById('prev').onclick = prev;
  addEventListener('keydown', e => {
    if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); next(); }
    else if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
    else if (e.key === 'Home') show(0);
    else if (e.key === 'End') show(els.length - 1);
  });
  addEventListener('click', e => { if (!e.target.closest('a,button')) next(); });
  show(parseInt(location.hash.slice(1)) - 1 || 0);
</script>
</body>
